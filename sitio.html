<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salva Ciudadana — Panel Municipal de Reportes Ciudadanos</title>
<meta name="description" content="Panel municipal para gestionar reportes ciudadanos de alcantarillas tapadas y centros de acopio llenos, con mapa interactivo y seguimiento de estado.">
<meta name="theme-color" content="#1b2a4a">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{
    --bg:#f3eee3;
    --bg-soft:#1b2a4a;
    --panel:#ffffff;
    --panel-2:#fbf7ee;
    --border:#e6dcc6;
    --text:#1b2435;
    --text-dim:#7a7263;
    --accent:#e2542c;
    --accent-dim:#fbdac9;
    --alta:#d62839;
    --media:#dba320;
    --baja:#1f8a8a;
    --terminado:#1f8a8a;
    --pendiente:#dba320;
    --radius:18px;
    --radius-lg:28px;
    font-size:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"Trebuchet MS",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overflow:hidden;
  }
  .visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;}
  a,button,input{font-family:inherit;}
  button{cursor:pointer;}
  :focus-visible{outline:3px solid var(--accent);outline-offset:2px;}

  /* ─── HEADER ─────────────────────────────────── */
  header{
    height:72px;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 26px;
    background:var(--bg-soft);
    border-bottom:4px solid var(--accent);
    position:relative;z-index:10;
  }
  .logo{display:flex;align-items:center;gap:12px;}
  .logo-icon{
    width:42px;height:42px;border-radius:50%;
    background:var(--accent);
    display:flex;align-items:center;justify-content:center;font-size:20px;
    box-shadow:0 0 0 4px rgba(226,84,44,.25);
  }
  .logo-text{font-size:22px;font-weight:800;letter-spacing:.2px;color:#fff;font-family:Georgia,'Times New Roman',serif;}
  .logo-text span{color:var(--accent);}
  .header-right{display:flex;align-items:center;gap:10px;}
  .badge{
    font-size:11.5px;font-weight:700;letter-spacing:.8px;
    padding:7px 14px;border-radius:999px;
    background:var(--accent);color:#fff;
  }
  .header-right button{
    background:transparent;color:#fff;
    border:2px solid rgba(255,255,255,.35);border-radius:999px;
    padding:8px 16px;font-size:13.5px;font-weight:700;
    transition:border-color .15s,background .15s;
  }
  .header-right button:hover{border-color:var(--accent);background:rgba(226,84,44,.18);}

  /* ─── LAYOUT (mapa a la izquierda, panel a la derecha) ── */
  .main{display:flex;flex-direction:row-reverse;height:calc(100vh - 72px);}
  .sidebar{
    width:400px;min-width:320px;
    background:var(--bg);
    border-left:1px solid var(--border);
    display:flex;flex-direction:column;
    overflow:hidden;
  }
  .sidebar-header{padding:20px 20px 14px;}
  .sidebar-title{font-size:12.5px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:12px;font-weight:700;}
  .stats{display:flex;gap:10px;margin-bottom:14px;}
  .stat{
    flex:1;background:var(--panel);border:2px solid var(--border);border-radius:999px;
    padding:10px 4px;text-align:center;
  }
  .stat.alta{border-color:var(--alta);}
  .stat.media{border-color:var(--media);}
  .stat.baja{border-color:var(--baja);}
  .stat-num{font-size:21px;font-weight:800;}
  .stat.alta .stat-num{color:var(--alta);}
  .stat.media .stat-num{color:var(--media);}
  .stat.baja .stat-num{color:var(--baja);}
  .stat-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;font-weight:700;}

  .filtros{display:flex;flex-wrap:wrap;gap:7px;padding:0 20px 16px;}
  .filtro-btn{
    background:#fff;border:2px solid var(--border);color:var(--text-dim);
    border-radius:999px;padding:7px 14px;font-size:12.5px;font-weight:700;
    transition:all .15s;
  }
  .filtro-btn:hover{border-color:var(--accent);color:var(--text);}
  .filtro-btn.active{background:var(--text);border-color:var(--text);color:#fff;}

  .lista-reportes{flex:1;overflow-y:auto;padding:6px 20px 20px;display:flex;flex-direction:column;gap:14px;}
  .reporte-card{
    background:var(--panel);border:1px solid var(--border);
    border-radius:var(--radius-lg);padding:16px 17px;cursor:pointer;
    box-shadow:0 3px 0 var(--border);
    transition:transform .12s,box-shadow .12s;
  }
  .reporte-card:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--border);}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
  .card-tipo{font-size:15px;font-weight:800;}
  .card-prioridad{font-size:10px;font-weight:800;text-transform:uppercase;padding:4px 10px;border-radius:999px;white-space:nowrap;letter-spacing:.4px;}
  .card-prioridad.alta{background:var(--alta);color:#fff;}
  .card-prioridad.media{background:var(--media);color:#fff;}
  .card-prioridad.baja{background:var(--baja);color:#fff;}
  .card-desc{font-size:13.5px;color:var(--text-dim);line-height:1.45;margin-bottom:8px;}
  .card-coords{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#a39a85;margin-bottom:10px;}
  .card-estado{display:inline-block;font-size:11px;font-weight:700;padding:4px 11px;border-radius:999px;margin-bottom:12px;border:1.5px solid;}
  .card-estado.nuevo{background:#fff;color:var(--text-dim);border-color:var(--border);}
  .card-estado.pendiente{background:#fff8e6;color:var(--pendiente);border-color:var(--pendiente);}
  .card-estado.terminado{background:#e9f7f5;color:var(--terminado);border-color:var(--terminado);}
  .card-acciones{display:flex;gap:8px;}
  .btn-accion{
    flex:1;border:2px solid var(--border);background:#fff;color:var(--text);
    border-radius:999px;padding:8px 8px;font-size:12px;font-weight:700;
    transition:border-color .15s,opacity .15s,background .15s;
  }
  .btn-iniciar:hover:not(:disabled){border-color:var(--pendiente);background:#fff8e6;color:var(--pendiente);}
  .btn-finalizar:hover:not(:disabled){border-color:var(--terminado);background:#e9f7f5;color:var(--terminado);}
  .btn-accion:disabled{opacity:.35;cursor:not-allowed;}
  .btn-accion.cargando{opacity:.6;cursor:wait;}

  .empty-state{text-align:center;padding:60px 16px;color:var(--text-dim);}
  .empty-state .icon{font-size:34px;margin-bottom:10px;}

  /* ─── MAPA ───────────────────────────────────── */
  #map{flex:1;background:#dfe6e9;}
  .leaflet-popup-content-wrapper{background:#fff;color:var(--text);border-radius:16px;}
  .leaflet-popup-tip{background:#fff;}
  .popup-tipo{font-weight:800;font-size:14px;margin-bottom:6px;}
  .popup-row{font-size:12.5px;color:var(--text-dim);margin-bottom:3px;}
  .popup-prioridad,.popup-estado{font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:999px;margin-right:6px;display:inline-block;}
  .popup-estado.nuevo{background:#f1ede2;color:var(--text-dim);}
  .popup-estado.pendiente{background:#fff8e6;color:var(--pendiente);}
  .popup-estado.terminado{background:#e9f7f5;color:var(--terminado);}

  /* ─── TOAST ──────────────────────────────────── */
  #toast{
    position:fixed;bottom:26px;left:50%;
    transform:translate(-50%,16px);
    background:var(--text);color:#fff;
    padding:12px 22px;border-radius:999px;font-size:13.5px;font-weight:700;
    opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;
    box-shadow:0 10px 28px rgba(0,0,0,.25);z-index:200;
    border:2px solid transparent;
  }
  #toast.show{opacity:1;transform:translate(-50%,0);}
  #toast.ok{border-color:var(--terminado);}
  #toast.error{border-color:var(--alta);}
  #toast.info{border-color:var(--pendiente);}

  /* ─── LOADING ────────────────────────────────── */
  #loading{
    position:fixed;inset:0;background:var(--bg-soft);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    z-index:999;
  }
  .spinner{
    width:36px;height:36px;border-radius:50%;
    border:4px solid rgba(255,255,255,.2);border-top-color:var(--accent);
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  #loading p{color:#fff;font-size:13.5px;font-weight:600;}

  /* ─── RESPONSIVE ─────────────────────────────── */
  @media (max-width:880px){
    .logo-text{font-size:17px;}
    .badge{display:none;}
    .header-right button{padding:7px 11px;font-size:12px;}
    .main{flex-direction:column-reverse;height:auto;min-height:calc(100vh - 72px);}
    .sidebar{width:100%;min-width:0;height:46vh;border-left:none;border-top:1px solid var(--border);}
    #map{height:54vh;}
  }

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001s !important;transition-duration:.001s !important;}
  }
</style>
</head>
<body>

<h1 class="visually-hidden">Salva Ciudadana — Panel municipal de reportes ciudadanos</h1>

<iframe id="proxy-frame" title="Conexión con Apps Script" style="display:none" aria-hidden="true"></iframe>

<div id="loading">
  <div class="spinner" role="status" aria-label="Cargando"></div>
  <p>Cargando reportes…</p>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<header>
  <div class="logo">
    <div class="logo-icon" aria-hidden="true">🚨</div>
    <div class="logo-text">Salva <span>Ciudadana</span></div>
  </div>
  <div class="header-right">
    <span class="badge">PANEL MUNICIPAL</span>
    <button id="btn-actualizar" onclick="cargarDatos()">↻ Actualizar</button>
  </div>
</header>

<main class="main">
  <nav class="sidebar" aria-label="Resumen y lista de reportes">
    <div class="sidebar-header">
      <div class="sidebar-title">Resumen</div>
      <div class="stats">
        <div class="stat alta"><div class="stat-num" id="cnt-alta">0</div><div class="stat-label">Alta</div></div>
        <div class="stat media"><div class="stat-num" id="cnt-media">0</div><div class="stat-label">Media</div></div>
        <div class="stat baja"><div class="stat-num" id="cnt-baja">0</div><div class="stat-label">Baja</div></div>
      </div>
    </div>
    <div class="filtros">
      <button class="filtro-btn active" onclick="filtrar('todos', this)">Todos</button>
      <button class="filtro-btn" onclick="filtrar('Alcantarilla tapada', this)">Alcantarilla</button>
      <button class="filtro-btn" onclick="filtrar('Centro de acopio lleno', this)">Acopio</button>
      <button class="filtro-btn" onclick="filtrar('Alta', this)">🔴 Alta</button>
      <button class="filtro-btn" onclick="filtrar('pendiente', this)">🟡 Pendiente</button>
      <button class="filtro-btn" onclick="filtrar('terminado', this)">🟢 Terminado</button>
    </div>
    <div class="lista-reportes" id="lista"></div>
  </nav>
  <div id="map" role="region" aria-label="Mapa de reportes"></div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  /* ─── CONFIGURACIÓN ─────────────────────────────
     SHEET_ID y SCRIPT_URL son fijos.
     COL_ESTADO: nombre exacto de la columna en tu Sheet (fila 1).
     Usamos _rowIndex (número de fila real en el Sheet, base 1)
     para todas las operaciones de escritura, lo cual es más
     robusto que buscar por el campo "id" (que en tu Sheet
     coincide con timestamps y puede dar problemas de precisión). */
  const SHEET_ID   = '1rbQ6Q_hmP3Vxxv7EKD5E3_vn6DjTSDuL1DjNPMLtVcM';
  const URL_CSV    = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=0`;
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxdPjmEy_bu4f7FVraganfWl9-u_Ut9e1pSXZNl71MjnL7T0sre6IJ67iBG8qzcGw8w/exec';

  /* Nombre exacto de la columna "estado" en tu Sheet (minúsculas) */
  const COL_ESTADO = 'estado';

  let mapa, reportes = [], markers = [], filtroActual = 'todos';

  /* ─── IFRAME PROXY ───────────────────────────────
     Apps Script rechaza fetch() por CORS.
     Cargamos la URL en un iframe oculto: el script se ejecuta
     y escribe en el Sheet aunque no podamos leer la respuesta. */
  function llamarScriptViaIframe(url) {
    return new Promise((resolve, reject) => {
      const frame = document.getElementById('proxy-frame');

      const timer = setTimeout(() => {
        frame.onload = null;
        frame.onerror = null;
        resolve({ success: true }); // timeout = probablemente sí se ejecutó
      }, 8000);

      frame.onload = () => {
        clearTimeout(timer);
        frame.onload = null;
        frame.onerror = null;
        resolve({ success: true });
      };

      frame.onerror = () => {
        clearTimeout(timer);
        frame.onload = null;
        frame.onerror = null;
        reject(new Error('Error de red'));
      };

      frame.src = url;
    });
  }

  /* ─── MAPA (tema claro, distinto al panel verde) ──── */
  mapa = L.map('map', { zoomControl: false }).setView([20.5, -100.5], 10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', subdomains: 'abcd', maxZoom: 19
  }).addTo(mapa);
  L.control.zoom({ position: 'bottomright' }).addTo(mapa);

  /* ─── HELPERS ───────────────────────────────────── */
  function getPrioridad(p) {
    if (!p) return 'baja';
    p = p.toLowerCase();
    if (p.includes('alta')) return 'alta';
    if (p.includes('media')) return 'media';
    return 'baja';
  }

  function getEstado(e) {
    if (!e) return 'nuevo';
    e = e.toLowerCase().trim();
    if (e.includes('terminado') || e.includes('completado') || e.includes('finalizado')) return 'terminado';
    if (e.includes('pendiente') || e.includes('iniciado') || e.includes('proceso')) return 'pendiente';
    return 'nuevo';
  }

  function getEstadoLabel(e) {
    const s = getEstado(e);
    if (s === 'terminado') return '✓ Terminado';
    if (s === 'pendiente') return '⏳ Pendiente';
    return '● Nuevo';
  }

  function getColor(p) {
    if (p === 'alta') return '#d62839';
    if (p === 'media') return '#dba320';
    return '#1f8a8a';
  }

  function crearIcono(prioridad, estado) {
    const color = getColor(prioridad);
    const ring  = getEstado(estado) === 'terminado' ? '#1f8a8a' : getEstado(estado) === 'pendiente' ? '#dba320' : '#1b2435';
    return L.divIcon({
      html: `<div style="width:15px;height:15px;background:${color};border:3px solid ${ring};border-radius:50%;box-shadow:0 2px 5px rgba(0,0,0,.35);"></div>`,
      className: '', iconSize: [15, 15], iconAnchor: [8, 8]
    });
  }

  /* ─── TOAST ─────────────────────────────────────── */
  let toastTimer;
  function mostrarToast(msg, tipo = 'ok') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${tipo}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
  }

  /* ─── CSV PARSER ────────────────────────────────── */
  function parsearCSV(texto) {
    const lineas = texto.trim().split('\n');
    const encabezados = lineas[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
    return lineas.slice(1).map((linea, rowIndex) => {
      const vals = [];
      let dentro = false, campo = '';
      for (let c of linea) {
        if (c === '"') { dentro = !dentro; continue; }
        if (c === ',' && !dentro) { vals.push(campo); campo = ''; continue; }
        campo += c;
      }
      vals.push(campo);
      const obj = { _rowIndex: rowIndex + 2 }; // fila real en Sheet (encabezado = fila 1)
      encabezados.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
      return obj;
    });
  }

  /* ─── ACTUALIZAR ESTADO ─────────────────────────────────────────────────
     FIX PRINCIPAL: tanto "Iniciar" como "Finalizar" ahora llaman siempre
     a actualizarEstado(). La diferencia es solo el valor que se escribe.

     Para ubicar la fila en el Sheet usamos rowId = _rowIndex (número de
     fila real, ej. 2, 3, 4...) y pasamos colId vacío para que el Apps
     Script use directamente ese número de fila sin buscar por columna id.
     Esto evita el problema de los timestamps como IDs.
  ──────────────────────────────────────────────────────────────────────── */
  async function actualizarEstado(reporte, nuevoEstado, btnI, btnF) {
    btnI.classList.add('cargando'); btnF.classList.add('cargando');
    const textoI = btnI.textContent;
    const textoF = btnF.textContent;
    btnI.textContent = '...'; btnF.textContent = '...';

    try {
      /* Usamos _rowIndex directamente. colId se deja vacío para que
         el Apps Script salte la búsqueda por columna y use rowId
         como número de fila directo (rama targetRow = parseInt(rowId)). */
      const params = new URLSearchParams({
        action:    'updateEstado',
        rowId:     String(reporte._rowIndex), // número de fila real en el Sheet
        colId:     '',                         // vacío → usa rowId como nº de fila
        colEstado: COL_ESTADO,
        estado:    nuevoEstado
      });

      const url = `${SCRIPT_URL}?${params.toString()}`;
      await llamarScriptViaIframe(url);

      /* Actualizamos el objeto local para reflejar el cambio sin recargar */
      reporte[COL_ESTADO] = nuevoEstado;

      if (nuevoEstado === 'Pendiente') {
        mostrarToast('⏳ Marcado como Pendiente', 'info');
      } else if (nuevoEstado === 'Terminado') {
        mostrarToast('✅ Marcado como Terminado', 'ok');
      }

      renderLista(reportesFiltrados());
      renderMapa(reportesFiltrados());

    } catch (err) {
      mostrarToast(`❌ ${err.message}`, 'error');
      btnI.textContent = textoI;
      btnF.textContent = textoF;
    } finally {
      btnI.classList.remove('cargando');
      btnF.classList.remove('cargando');
    }
  }

  /* ─── FILTROS ───────────────────────────────────── */
  function reportesFiltrados() {
    if (filtroActual === 'terminado') {
      return reportes.filter(r => getEstado(r[COL_ESTADO]) === 'terminado');
    }
    const activos = reportes.filter(r => getEstado(r[COL_ESTADO]) !== 'terminado');
    if (filtroActual === 'todos') return activos;
    return activos.filter(r =>
      r.tipo?.toLowerCase().includes(filtroActual.toLowerCase()) ||
      r.prioridad?.toLowerCase().includes(filtroActual.toLowerCase()) ||
      getEstado(r[COL_ESTADO]).includes(filtroActual.toLowerCase())
    );
  }

  function filtrar(tipo, btn) {
    filtroActual = tipo;
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderLista(reportesFiltrados());
    renderMapa(reportesFiltrados());
  }

  /* ─── RENDER LISTA ──────────────────────────────── */
  function renderLista(datos) {
    const lista = document.getElementById('lista');
    if (!datos.length) {
      lista.innerHTML = `<div class="empty-state"><div class="icon">📍</div><p>No hay reportes</p></div>`;
      return;
    }
    lista.innerHTML = '';
    datos.forEach(r => {
      const p   = getPrioridad(r.prioridad);
      const est = getEstado(r[COL_ESTADO]);
      const lat = parseFloat(r.latitud), lng = parseFloat(r.longitud);
      const ok  = !isNaN(lat) && !isNaN(lng);

      const card = document.createElement('div');
      card.className = `reporte-card ${p}`;
      card.innerHTML = `
        <div class="card-top">
          <div class="card-tipo">${r.tipo || 'Sin tipo'}</div>
          <span class="card-prioridad ${p}">${r.prioridad || 'Baja'}</span>
        </div>
        <div class="card-desc">${r.descripcion || 'Sin descripción'}</div>
        ${ok ? `<div class="card-coords">${lat.toFixed(4)}, ${lng.toFixed(4)}</div>` : ''}
        <span class="card-estado ${est}">${getEstadoLabel(r[COL_ESTADO])}</span>
        <div class="card-acciones">
          <button class="btn-accion btn-iniciar"  ${est !== 'nuevo'     ? 'disabled' : ''}>▶ Iniciar</button>
          <button class="btn-accion btn-finalizar" ${est === 'terminado' ? 'disabled' : ''}>✓ Finalizar</button>
        </div>`;

      card.addEventListener('click', e => {
        if (e.target.classList.contains('btn-accion')) return;
        if (ok) { const idx = reportes.indexOf(r); mapa.setView([lat, lng], 16); markers[idx]?.openPopup(); }
      });

      const btnI = card.querySelector('.btn-iniciar');
      const btnF = card.querySelector('.btn-finalizar');

      /* ▶ Iniciar → escribe "Pendiente" en el Sheet */
      btnI.addEventListener('click', e => {
        e.stopPropagation();
        actualizarEstado(r, 'Pendiente', btnI, btnF);
      });

      /* ✓ Finalizar → escribe "Terminado" en el Sheet (ya NO elimina la fila) */
      btnF.addEventListener('click', e => {
        e.stopPropagation();
        actualizarEstado(r, 'Terminado', btnI, btnF);
      });

      lista.appendChild(card);
    });
  }

  /* ─── RENDER MAPA ───────────────────────────────── */
  function renderMapa(datos) {
    markers.forEach(m => m && mapa.removeLayer(m));
    markers = [];
    const bounds = [];
    reportes.forEach(r => {
      const lat = parseFloat(r.latitud), lng = parseFloat(r.longitud);
      if (isNaN(lat) || isNaN(lng)) { markers.push(null); return; }
      const p = getPrioridad(r.prioridad);
      const marker = L.marker([lat, lng], { icon: crearIcono(p, r[COL_ESTADO]) });
      marker.bindPopup(`
        <div class="popup-tipo">${r.tipo || 'Sin tipo'}</div>
        <div class="popup-row"><strong>Descripción:</strong> ${r.descripcion || '—'}</div>
        <div class="popup-row"><strong>Coords:</strong> ${lat.toFixed(5)}, ${lng.toFixed(5)}</div>
        <div style="margin-top:8px;">
          <span class="popup-prioridad ${p}" style="background:${getColor(p)}22;color:${getColor(p)}">${r.prioridad || 'Baja'}</span>
          <span class="popup-estado ${getEstado(r[COL_ESTADO])}">${getEstadoLabel(r[COL_ESTADO])}</span>
        </div>`);
      if (datos.includes(r)) { marker.addTo(mapa); bounds.push([lat, lng]); }
      markers.push(marker);
    });
    if (bounds.length) mapa.fitBounds(bounds, { padding: [40, 40] });
  }

  /* ─── STATS ─────────────────────────────────────── */
  function actualizarStats(datos) {
    document.getElementById('cnt-alta').textContent  = datos.filter(r => getPrioridad(r.prioridad) === 'alta').length;
    document.getElementById('cnt-media').textContent = datos.filter(r => getPrioridad(r.prioridad) === 'media').length;
    document.getElementById('cnt-baja').textContent  = datos.filter(r => getPrioridad(r.prioridad) === 'baja').length;
  }

  /* ─── CARGAR DATOS ──────────────────────────────── */
  async function cargarDatos() {
    try {
      document.getElementById('btn-actualizar').textContent = '↻ Cargando...';
      const res   = await fetch(URL_CSV);
      const texto = await res.text();
      reportes = parsearCSV(texto).filter(r => r.tipo || r.descripcion);
      reportes.sort((a, b) => b._rowIndex - a._rowIndex);
      actualizarStats(reportes.filter(r => getEstado(r[COL_ESTADO]) !== 'terminado'));
      renderLista(reportesFiltrados());
      renderMapa(reportesFiltrados());
    } catch (e) {
      document.getElementById('lista').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Error al cargar datos. Revisa que el Sheet esté compartido como público de lectura.</p></div>`;
    } finally {
      document.getElementById('btn-actualizar').textContent = '↻ Actualizar';
      const ld = document.getElementById('loading');
      if (ld) ld.style.display = 'none';
    }
  }

  setTimeout(() => { const ld = document.getElementById('loading'); if (ld) ld.style.display = 'none'; }, 5000);

  cargarDatos();
</script>
</body>
</html>
